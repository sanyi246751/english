<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>品量的英語小助手</title>
    <link rel="stylesheet" href="style.css">
    <!-- 引入必要的庫 -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.0.2/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <h1 class="glow-text">品量的英語小助手</h1>
            <p class="subtitle">掃描、聆聽、跟讀，英文變簡單！</p>
        </header>

        <main>
            <!-- 📚 主要操作區 -->
            <div class="glass-card compact-input">
                <div class="button-group-row">
                    <button id="btn-upload-trigger" class="btn-micro btn-blue">
                        <span class="icon">📁</span> 上傳檔案
                    </button>
                    <button id="btn-camera-toggle" class="btn-micro btn-pink">
                        <span class="icon">📷</span> 開啟相機
                    </button>
                    <input type="file" id="file-input" accept="image/*,application/pdf" style="display: none;">
                </div>

                <!-- 相機預覽區 -->
                <div id="camera-container" class="hidden">
                    <div class="video-wrapper">
                        <video id="camera-stream" autoplay muted playsinline></video>
                    </div>
                    <div class="camera-actions">
                        <button id="btn-capture" class="btn-primary">📸 拍照識別</button>
                        <button id="btn-camera-close" class="btn-secondary">❌ 關閉</button>
                    </div>
                </div>
            </div>

            <div class="glass-card controls-section">
                <div class="grid-controls">
                    <div class="control-group">
                        <label>🔁 重複次數</label>
                        <input type="number" id="repeat-count" value="1" min="1" max="10">
                    </div>
                    <div class="control-group">
                        <label>⏱ 間隔 (秒)</label>
                        <input type="number" id="interval" value="1" min="0" max="10" step="0.5">
                    </div>
                    <div class="control-group">
                        <label>🔊 語速: <span id="rate-value">1.0</span></label>
                        <input type="range" id="rate" min="0.5" max="2" value="1" step="0.1">
                    </div>
                </div>
            </div>

            <div class="glass-card text-section">
                <div class="section-header">
                    <h2>📖 品量的英語小筆記</h2>
                    <div class="buttons">
                        <button id="btn-read" class="btn-primary">▶ 開始朗讀</button>
                        <button id="btn-stop" class="btn-secondary">⏹ 停止</button>
                    </div>
                </div>
                <textarea id="text-output" placeholder="辨識後的文字會顯示在這裡..."></textarea>
            </div>
            
            <div id="status-display" class="status-indicator hidden">正在處理中...</div>
        </main>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
